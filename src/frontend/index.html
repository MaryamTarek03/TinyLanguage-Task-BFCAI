<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny Language Lexer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header-controls">
      <div class="left-controls">
        <button onclick="tokenize()">Run</button>
        <div id="theme-switcher" class="custom-select">
          <div class="select-selected">Nord</div>
          <div class="select-items select-hide">
            <div class="select-group">Dark Themes</div>
            <div data-value="default">Nord</div>
            <div data-value="vscode-dark">VSCode Dark</div>
            <div data-value="catppuccin">Catppuccin</div>
            <div class="select-group">Light Themes</div>
            <div data-value="rose-pine-dawn">Rosé Pine Dawn</div>
            <div data-value="sakura">Sakura</div>
          </div>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <div class="color-box" style="background: var(--keyword)"></div>
          Keyword
        </div>
        <div class="legend-item">
          <div class="color-box" style="background: var(--id)"></div>
          Identifier
        </div>
        <div class="legend-item">
          <div class="color-box" style="background: var(--number)"></div>
          Number
        </div>
        <div class="legend-item">
          <div class="color-box" style="background: var(--string)"></div>
          String
        </div>
        <div class="legend-item">
          <div class="color-box" style="background: var(--operator)"></div>
          Operator/Symbol
        </div>
        <div class="legend-item">
          <div class="color-box" style="background: var(--unknown)"></div>
          Unknown
        </div>
      </div>
    </div>

    <div class="container">
      <textarea id="sourceCode" spellcheck="false">
write "Hello Lexer!";
read x; { Example Program }
if 0 < x then
  fact := 1;
  repeat
    fact := fact * x;
    x := x - 1
  until x = 0;
  write fact;
end</textarea
      >

      <div class="right-panel">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('highlight')">
            Syntax View
          </button>
          <button class="tab-btn" onclick="switchTab('table')">
            Token Table
          </button>
        </div>

        <div id="highlight" class="tab-content active output-container"></div>

        <div id="table" class="tab-content">
          <table id="tokenTable">
            <thead>
              <tr>
                <th>Line</th>
                <th>Type</th>
                <th>Lexeme</th>
                <th>Start</th>
                <th>Length</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="explanation-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <span id="modal-title">Keyword</span>
          <button id="close-modal-btn" class="close-btn">×</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>
    <div id="custom-tooltip" class="tooltip"></div>
    <script src="script.js" s></script>
  </body>
</html>
